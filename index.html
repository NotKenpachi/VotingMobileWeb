<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YES or NO?</title>

  <!-- ── PWA: Web App Manifest ──────────────────────────────────── -->
  <link rel="manifest" href="manifest.json" />

  <!-- ── PWA: Android theme color (browser chrome) ─────────────── -->
  <meta name="theme-color" content="#0d0d12" />

  <!-- ── PWA: iOS / Safari home-screen support ─────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="YES/NO" />
  <link rel="apple-touch-icon" href="icon.svg" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── START SCREEN ─────────────────────────────────────────── -->
  <div id="screen-start" class="screen active">
    <div class="start-inner">
      <div class="logo">
        <span class="logo-yes">YES</span>
        <span class="logo-or">or</span>
        <span class="logo-no">NO</span>
        <span class="logo-mark">?</span>
      </div>
      <p class="tagline">100 dilemmas. No maybe. No in-between.</p>
      <button id="btn-start" class="btn btn-primary">Start Voting</button>
      <button id="btn-view-results" class="btn btn-outline">View Results</button>
      <p id="start-status" class="start-status"></p>
    </div>
  </div>

  <!-- ── VOTE SCREEN ───────────────────────────────────────────── -->
  <div id="screen-vote" class="screen">

    <header class="vote-header">
      <div class="progress-meta">
        <span id="q-answered">0</span>
        <span class="progress-sep">/</span>
        <span id="q-total">100</span>
        <span class="progress-label">answered</span>
      </div>
      <div class="progress-track">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
    </header>

    <main class="vote-body">
      <div id="question-card" class="question-card">

        <!-- Swipe direction labels — revealed as the user drags the card -->
        <div id="indicator-no"  class="swipe-indicator indicator-no">✗ NO</div>
        <div id="indicator-yes" class="swipe-indicator indicator-yes">YES ✓</div>

        <p id="question-text" class="question-text"></p>

        <!-- Hint fades out after the first vote -->
        <p id="swipe-hint" class="swipe-hint">← swipe or tap buttons →</p>

      </div>
    </main>

    <footer class="vote-footer">
      <button id="btn-yes" class="vote-btn yes-btn">
        <span class="vote-icon">✓</span>
        <span class="vote-label">YES</span>
      </button>
      <button id="btn-no" class="vote-btn no-btn">
        <span class="vote-icon">✗</span>
        <span class="vote-label">NO</span>
      </button>
    </footer>

    <nav class="vote-nav">
      <button id="btn-skip" class="btn-ghost">Skip</button>
      <button id="btn-nav-results" class="btn-ghost">Results</button>
    </nav>

  </div>

  <!-- ── RESULTS SCREEN ───────────────────────────────────────── -->
  <div id="screen-results" class="screen">

    <header class="results-header">
      <h1 class="results-title">Your Results</h1>
      <div class="tally">
        <div class="tally-box tally-yes">
          <span id="tally-yes-count">0</span>
          <label>YES</label>
        </div>
        <div class="tally-box tally-no">
          <span id="tally-no-count">0</span>
          <label>NO</label>
        </div>
        <div class="tally-box tally-skip">
          <span id="tally-skip-count">0</span>
          <label>Skipped</label>
        </div>
      </div>
      <div id="results-remaining" class="results-remaining"></div>
    </header>

    <main class="results-body">

      <section class="answers-section">
        <h2 class="section-heading yes-heading">
          <span class="section-icon">✓</span> YES Answers
        </h2>
        <ul id="yes-list" class="answer-list"></ul>
      </section>

      <section class="answers-section">
        <h2 class="section-heading no-heading">
          <span class="section-icon">✗</span> NO Answers
        </h2>
        <ul id="no-list" class="answer-list"></ul>
      </section>

    </main>

    <footer class="results-footer">
      <button id="btn-continue" class="btn btn-primary">Continue Voting</button>
      <button id="btn-reset" class="btn btn-danger">Reset All Votes</button>
      <button id="btn-home" class="btn-ghost">Back to Home</button>
    </footer>

  </div>

  <script src="app.js"></script>

  <!-- ── PWA: Service Worker registration ──────────────────────────
       Service Workers only activate over HTTP(S) or localhost.
       Opening index.html as a file:// URL will skip registration.
  ───────────────────────────────────────────────────────────────── -->
  <script>
    if ('serviceWorker' in navigator && location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg  => console.log('[PWA] Service Worker registered:', reg.scope))
          .catch(err => console.warn('[PWA] Service Worker failed:', err));
      });
    }
  </script>

</body>
</html>
